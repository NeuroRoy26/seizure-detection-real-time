services:
  backend:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  frontend:
    build: .
    depends_on:
      - backend
    environment:
      # Streamlit runs in a separate container, so it must reach FastAPI via the compose service name.
      - API_URL=http://backend:8000/latest
    command: streamlit run dashboard.py --server.address=0.0.0.0 --server.port=8501 --server.headless=true
    ports:
      - "8501:8501"

