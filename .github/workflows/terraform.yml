name: Terraform CI

on:
  push:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

jobs:
  terraform-checks:
    name: Terraform Format, Validate, and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform

    env:
      AWS_ACCESS_KEY_ID: "mock_key_for_testing"
      AWS_SECRET_ACCESS_KEY: "mock_secret_for_testing"
      AWS_DEFAULT_REGION: "eu-central-1"
      TF_VAR_skip_credentials_validation: true
      TF_VAR_skip_requesting_account_id: true
      TF_VAR_skip_metadata_api_check: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init (Offline Mode)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Test (Plan-based Unit Tests)
        run: terraform test

      - name: Run Trivy Security Scanner (IaC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: true
          exit-code: '0' # Set to '1' in strict production environments to fail on high vulnerabilities
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
